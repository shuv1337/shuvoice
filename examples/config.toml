# ShuVoice example configuration

[audio]
sample_rate = 16000
chunk_ms = 100
fallback_sample_rate = 48000
# Optional explicit input device name/index (see: python -m shuvoice --list-audio-devices)
# audio_device = 2
# Optional mic gain multiplier (eg. 1.5 if too quiet)
input_gain = 1.0
# Max queued chunks before dropping oldest (bounded queue for lower latency)
audio_queue_max_size = 200
# Absolute RMS floor used to suppress silence hallucinations on empty presses
silence_rms_threshold = 0.008
# Dynamic speech threshold multiplier based on ambient noise floor
silence_rms_multiplier = 1.8
# Minimum above-threshold speech to consider an utterance valid
min_speech_ms = 80

[asr]
# nemo | sherpa | moonshine
asr_backend = "nemo"

# NeMo settings
model_name = "nvidia/nemotron-speech-streaming-en-0.6b"
# NeMo-only
right_context = 13
# cuda | cpu
device = "cuda"
# Keep false unless you have verified CUDA graph decoder stability on your stack
use_cuda_graph_decoder = false

# Sherpa settings (used when asr_backend = "sherpa")
# sherpa_model_dir = "/path/to/sherpa-streaming-model"
# sherpa_provider = "cpu"   # cpu | cuda
# sherpa_num_threads = 2
# sherpa_chunk_ms = 100

# Moonshine settings (used when asr_backend = "moonshine")
# moonshine_model_name = "moonshine/base"
# moonshine_model_dir = "/path/to/local/moonshine-model"   # optional
# moonshine_model_precision = "float"
# moonshine_chunk_ms = 100
# moonshine_max_window_sec = 32.0
# moonshine_max_tokens = 192

[overlay]
font_size = 22
bg_opacity = 0.75
border_radius = 16
bottom_margin = 60

[hotkey]
# evdev | ipc
hotkey_backend = "evdev"
# evdev key code name
hotkey = "KEY_RIGHTCTRL"
hold_threshold_ms = 300
# Optional explicit /dev/input/eventX device path
# hotkey_device = "/dev/input/event3"
# Listen to all matching keyboards (usually keep false to avoid duplicate events)
hotkey_listen_all_devices = false
# Optional control socket override
# control_socket = "/run/user/1000/shuvoice/control.sock"

[typing]
# final_only | streaming_partial
output_mode = "final_only"
use_clipboard_for_final = true
preserve_clipboard = false
typing_retry_attempts = 2
typing_retry_delay_ms = 40
auto_capitalize = true

[streaming]
# Stall guard injects a short silent flush when transcript stalls despite speech energy.
streaming_stall_guard = true
streaming_stall_chunks = 4
streaming_stall_rms_ratio = 0.7
streaming_stall_flush_chunks = 1

[feedback]
audio_feedback = true
feedback_start_freq = 880
feedback_stop_freq = 660
feedback_duration_ms = 70
feedback_volume = 0.08
