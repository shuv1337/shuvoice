# ShuVoice example configuration

config_version = 1

[audio]
sample_rate = 16000
chunk_ms = 100
fallback_sample_rate = 48000
# Optional explicit input device name/index (see: python -m shuvoice audio list-devices)
# audio_device = 2
# Optional mic gain multiplier (eg. 1.5 if too quiet)
input_gain = 1.0
# Max queued chunks before dropping oldest (bounded queue for lower latency)
audio_queue_max_size = 200
# Absolute RMS floor used to suppress silence hallucinations on empty presses
silence_rms_threshold = 0.008
# Dynamic speech threshold multiplier based on ambient noise floor
silence_rms_multiplier = 1.8
# Minimum above-threshold speech to consider an utterance valid
min_speech_ms = 80
# App-side per-utterance auto-gain (used by backends that do not request raw audio,
# currently Sherpa). NeMo and Moonshine bypass this gain path.
auto_gain_target_peak = 0.15
auto_gain_max = 10.0
auto_gain_settle_chunks = 2

[asr]
# sherpa | nemo | moonshine
asr_backend = "sherpa"
# Optional low-latency profile. When true, ShuVoice applies backend-specific
# fast-path tuning (for moonshine this forces moonshine/tiny + tighter decode window).
# instant_mode = false

# NeMo settings
model_name = "nvidia/nemotron-speech-streaming-en-0.6b"
# NeMo-only
right_context = 13
# cuda | cpu
device = "cuda"
# Keep false unless you have verified CUDA graph decoder stability on your stack
use_cuda_graph_decoder = false

# Sherpa settings (used when asr_backend = "sherpa")
# sherpa_model_name = "sherpa-onnx-streaming-zipformer-en-kroko-2025-08-06"
# sherpa_decode_mode = "auto"  # auto | streaming | offline_instant
# For Parakeet TDT v3 via Sherpa release assets (stable/default path):
# sherpa_model_name = "sherpa-onnx-nemo-parakeet-tdt-0.6b-v3-int8"
# instant_mode = true
# sherpa_decode_mode = "offline_instant"
#
# Optional Parakeet streaming override:
# sherpa_decode_mode = "streaming"
# sherpa_enable_parakeet_streaming = true
# sherpa_model_dir = "/path/to/sherpa-model"  # optional; auto-downloads selected sherpa_model_name when unset
# sherpa_provider = "cpu"   # cpu | cuda
# sherpa_num_threads = 2
# sherpa_chunk_ms = 100       # streaming mode only; ignored for offline_instant

# Moonshine settings (used when asr_backend = "moonshine")
# moonshine_model_name = "moonshine/tiny"         # moonshine/tiny (fast) or moonshine/base (slower, slightly more accurate)
# moonshine_model_dir = "/path/to/local/moonshine-model"   # optional
# moonshine_model_precision = "float"
# moonshine_chunk_ms = 100
# moonshine_max_window_sec = 5.0
# moonshine_max_tokens = 64
# moonshine_provider = "cpu"                       # cpu | cuda (requires onnxruntime with CUDAExecutionProvider)
# moonshine_onnx_threads = 0                       # 0 = auto; set explicitly to tune CPU parallelism

[overlay]
font_size = 22
# Optional per-overlay font family (app-only, does not change system/global GTK fonts)
# Allowed characters: letters, numbers, spaces, '.', '_' and '-'
# font_family = "JetBrains Mono"
bg_opacity = 0.75
border_radius = 16
bottom_margin = 60

[control]
# Optional control socket override (defaults to "$XDG_RUNTIME_DIR/shuvoice/control.sock")
# control_socket = "/path/to/control.sock"

[tts]
# true | false
# tts_enabled = true
# elevenlabs | local
# tts_backend = "elevenlabs"
# ElevenLabs defaults
# tts_default_voice_id = "zNsotODqUhvbJ5wMG7Ei"
# tts_model_id = "eleven_multilingual_v2"
# tts_api_key_env = "ELEVENLABS_API_KEY"
# tts_output_format = "pcm_24000"
# tts_max_chars = 5000
# tts_request_timeout_sec = 30.0
# Optional output device name/index for TTS playback
# tts_playback_device = 3
# tts_overlay_auto_hide_sec = 2.0
# Local backend scaffold (tts_backend = "local")
# tts_local_model_path = "/path/to/piper-model.onnx"
# tts_local_voice = "en_US-amy-medium"
# tts_local_device = 3

[typing]
# final_only | streaming_partial
output_mode = "final_only"
# auto | clipboard | direct. Auto avoids clipboard pollution when Omarchy/Elephant is detected.
typing_final_injection_mode = "auto"
typing_clipboard_settle_delay_ms = 40
# use_clipboard_for_final is soft-deprecated in favor of typing_final_injection_mode
use_clipboard_for_final = true
preserve_clipboard = false
typing_retry_attempts = 2
typing_retry_delay_ms = 40
auto_capitalize = true
# Optional word/phrase corrections applied to final text before typing.
# Case-insensitive, whole-word/phrase matches. Use empty value to delete a word.
# Built-in defaults already normalize common ShuVoice/Hyprland variants
# (e.g. "shove voice", "shu voice", "show voice", "hyper land", "high per land").
# Add your own entries (or override built-ins) below.
# [typing.text_replacements]
# "speech to text" = "speech-to-text"
# "um" = ""

[streaming]
# Stall guard injects a short silent flush when transcript stalls despite speech energy.
streaming_stall_guard = true
streaming_stall_chunks = 4
streaming_stall_rms_ratio = 0.7
streaming_stall_flush_chunks = 1

[feedback]
audio_feedback = true
feedback_start_freq = 880
feedback_stop_freq = 660
feedback_duration_ms = 70
feedback_volume = 0.08
