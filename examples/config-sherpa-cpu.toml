# ShuVoice example: Sherpa ONNX on CPU

config_version = 1

[audio]
sample_rate = 16000
chunk_ms = 100
fallback_sample_rate = 48000
input_gain = 1.0
audio_queue_max_size = 200
silence_rms_threshold = 0.006
silence_rms_multiplier = 1.3
min_speech_ms = 80
auto_gain_target_peak = 0.15
auto_gain_max = 10.0
auto_gain_settle_chunks = 2

[asr]
asr_backend = "sherpa"
# Default streaming model:
# sherpa_model_name = "sherpa-onnx-streaming-zipformer-en-kroko-2025-08-06"
# sherpa_decode_mode = "auto"
#
# Parakeet TDT v3 offline-instant option:
# sherpa_model_name = "sherpa-onnx-nemo-parakeet-tdt-0.6b-v3-int8"
# instant_mode = true
# sherpa_decode_mode = "offline_instant"
#
# Set this to your local model directory. See README.md for Sherpa model setup.
sherpa_model_dir = "/path/to/sherpa-model-dir"
sherpa_provider = "cpu"
sherpa_num_threads = 4
sherpa_chunk_ms = 100

[control]
# Defaults to "$XDG_RUNTIME_DIR/shuvoice/control.sock" when unset.
# control_socket = "/path/to/control.sock"

[typing]
output_mode = "final_only"
typing_final_injection_mode = "auto"
use_clipboard_for_final = true