name: CI

on:
  push:
    branches: [master, main]
  pull_request:
  workflow_dispatch:
    inputs:
      run_gui:
        description: "Run optional GUI smoke tests"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libportaudio2 libasound2t64 libevdev2 \
            gobject-introspection libgirepository1.0-dev libgirepository-2.0-dev libcairo2-dev pkg-config

      - name: Install dependencies
        run: uv sync --dev

      - name: Ruff check
        run: uv run ruff check shuvoice tests scripts

      - name: Ruff format check
        run: uv run ruff format --check shuvoice tests scripts

      - name: Docs/config drift checks
        run: |
          uv run python scripts/validate-doc-config-sync.py
          uv run python scripts/validate-cli-help-sync.py

  unit:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libportaudio2 libasound2t64 libevdev2 \
            gir1.2-gtk-4.0 \
            gobject-introspection libgirepository1.0-dev libgirepository-2.0-dev libcairo2-dev pkg-config

      - name: Install Python dependencies
        run: uv sync --dev

      - name: Run headless-safe unit tests
        run: uv run pytest -m "not gui and not e2e and not integration and not gpu" -v

  e2e:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libportaudio2 libasound2t64 libevdev2 \
            gir1.2-gtk-4.0 \
            gobject-introspection libgirepository1.0-dev libgirepository-2.0-dev libcairo2-dev pkg-config

      - name: Install Python dependencies
        run: uv sync --dev

      - name: Run IPC end-to-end tests
        run: uv run pytest -m e2e -v

  gui-smoke:
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.run_gui == 'true' }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libportaudio2 libasound2t64 libevdev2 \
            python3-gi gir1.2-gtk-4.0 \
            gobject-introspection libgirepository1.0-dev libgirepository-2.0-dev libcairo2-dev pkg-config

      - name: Install Python dependencies
        run: uv sync --dev

      - name: Run GUI smoke tests
        run: uv run pytest -m gui -v
