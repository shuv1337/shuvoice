name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      run_gui:
        description: "Run optional GUI smoke tests"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libportaudio2 libasound2t64 libevdev2 \
            gobject-introspection libgirepository1.0-dev libcairo2-dev pkg-config

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Ruff check
        run: ruff check shuvoice/ tests/

      - name: Ruff format check
        run: ruff format --check shuvoice/ tests/

  unit:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libportaudio2 libasound2t64 libevdev2 \
            gobject-introspection libgirepository1.0-dev libcairo2-dev pkg-config

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Run headless-safe unit tests
        run: pytest -m "not gui" -v

  gui-smoke:
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.run_gui == 'true' }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libportaudio2 libasound2t64 libevdev2 \
            python3-gi gir1.2-gtk-4.0 \
            gobject-introspection libgirepository1.0-dev libcairo2-dev pkg-config

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Run GUI smoke tests
        run: pytest -m gui -v
